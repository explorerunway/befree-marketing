<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BeFree · Signal</title>
<style>
  :root{
    --bg:#ece9e3; --surface:#f7f5f1; --surface-2:#f0ede7;
    --ink:#221f1a; --muted:#6c665c; --faint:#948d81; --line:#dcd6cc;
    --accent:#7c4f80; --accent-soft:#7c4f8022;
    --brass:#a9702f; --brass-soft:#a9702f1f;
    --good:#3d7d58; --good-soft:#3d7d5822;
    --warn:#9c6b16; --warn-soft:#9c6b1622;
    --crit:#b0422c; --crit-soft:#b0422c22;
    --shadow:0 1px 0 #ffffff80, 0 12px 30px -18px #2a231a55;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#141310; --surface:#1d1b16; --surface-2:#211e18;
      --ink:#efe9dd; --muted:#a49b8b; --faint:#6f685c; --line:#2f2b23;
      --accent:#c497c6; --accent-soft:#c497c61f;
      --brass:#d29350; --brass-soft:#d293501c;
      --good:#63b088; --good-soft:#63b0881c;
      --warn:#d6a94e; --warn-soft:#d6a94e1c;
      --crit:#e0785c; --crit-soft:#e0785c1c;
      --shadow:0 0 0 1px #0003, 0 18px 40px -22px #0009;
    }
  }
  :root[data-theme="light"]{ color-scheme:light;
    --bg:#ece9e3; --surface:#f7f5f1; --surface-2:#f0ede7; --ink:#221f1a; --muted:#6c665c; --faint:#948d81; --line:#dcd6cc;
    --accent:#7c4f80; --accent-soft:#7c4f8022; --brass:#a9702f; --brass-soft:#a9702f1f; --good:#3d7d58; --good-soft:#3d7d5822;
    --warn:#9c6b16; --warn-soft:#9c6b1622; --crit:#b0422c; --crit-soft:#b0422c22; --shadow:0 1px 0 #ffffff80,0 12px 30px -18px #2a231a55; }
  :root[data-theme="dark"]{ color-scheme:dark;
    --bg:#141310; --surface:#1d1b16; --surface-2:#211e18; --ink:#efe9dd; --muted:#a49b8b; --faint:#6f685c; --line:#2f2b23;
    --accent:#c497c6; --accent-soft:#c497c61f; --brass:#d29350; --brass-soft:#d293501c; --good:#63b088; --good-soft:#63b0881c;
    --warn:#d6a94e; --warn-soft:#d6a94e1c; --crit:#e0785c; --crit-soft:#e0785c1c; --shadow:0 0 0 1px #0003,0 18px 40px -22px #0009; }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; line-height:1.5}
  .wrap{padding:clamp(16px,3.5vw,44px)}
  .page{max-width:1120px; margin:0 auto; display:flex; flex-direction:column; gap:22px}
  .num{font-family:var(--mono); font-variant-numeric:tabular-nums}
  .eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint)}
  h1{font-size:clamp(24px,4vw,38px); line-height:1.03; letter-spacing:-.02em; margin:.3em 0 .1em; font-weight:800}
  h2{font-size:18px; letter-spacing:-.01em; margin:0; font-weight:750}
  h3{font-size:14px; margin:0; font-weight:700}
  p{margin:0}
  a{color:var(--accent)}

  /* login */
  .gate{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px}
  .gatecard{background:var(--surface); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); padding:30px; width:100%; max-width:400px}
  .gatecard h1{font-size:26px; margin:14px 0 4px}
  .gatecard p.sub{color:var(--muted); font-size:13.5px; margin-bottom:20px}
  .mark{width:44px;height:44px;border-radius:12px;background:var(--accent-soft);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px}
  label.fl{display:block; font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); margin:14px 0 6px}
  input{width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; color:var(--ink); font-size:15px; font-family:var(--sans)}
  input:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent)}
  button.primary{width:100%; margin-top:18px; background:var(--accent); color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:650; cursor:pointer}
  button.primary:disabled{opacity:.55; cursor:default}
  .altauth{margin-top:16px; text-align:center}
  .altauth a{font-size:12.5px; cursor:pointer}
  .err{color:var(--crit); font-size:13px; margin-top:14px; background:var(--crit-soft); border:1px solid var(--crit); border-radius:10px; padding:9px 12px; display:none}
  .err.show{display:block}
  .hint{font-size:11.5px; color:var(--faint); margin-top:18px; line-height:1.5; border-top:1px solid var(--line); padding-top:14px}

  /* topbar */
  header.top{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap}
  .thesis{max-width:62ch; color:var(--muted); font-size:15px; margin-top:6px}
  .thesis b{color:var(--ink); font-weight:650}
  .controls{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .chip{font-family:var(--mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; background:var(--surface); color:var(--muted);
    border:1px solid var(--line); border-radius:999px; padding:7px 12px; cursor:pointer}
  .chip:hover{color:var(--ink); border-color:var(--accent)}
  .live{display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11px; color:var(--muted); background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:7px 12px}
  .live .dot{width:7px;height:7px;border-radius:50%; background:var(--good); box-shadow:0 0 0 0 var(--good); animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 #3d7d5866}70%{box-shadow:0 0 0 7px #3d7d5800}100%{box-shadow:0 0 0 0 #3d7d5800}}

  .callout{background:var(--accent-soft); border:1px solid var(--accent); border-radius:14px; padding:15px 18px; display:flex; gap:14px; align-items:baseline; flex-wrap:wrap}
  .callout .big{font-family:var(--mono); font-size:21px; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums}
  .callout p{color:var(--ink); font-size:14px; max-width:74ch}

  .kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:13px}
  .kpi{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:15px 15px 13px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:5px; position:relative; overflow:hidden}
  .kpi::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--stripe,var(--line))}
  .kpi .label{font-family:var(--mono); font-size:10px; letter-spacing:.11em; text-transform:uppercase; color:var(--faint)}
  .kpi .val{font-family:var(--mono); font-size:30px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; letter-spacing:-.02em}
  .kpi .val small{font-size:14px; color:var(--muted); font-weight:600}
  .kpi .sub{font-size:11.5px; color:var(--muted)}

  .pill{display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; padding:3px 8px; border-radius:999px; width:fit-content; font-weight:600}
  .pill.good{background:var(--good-soft); color:var(--good)} .pill.warn{background:var(--warn-soft); color:var(--warn)}
  .pill.crit{background:var(--crit-soft); color:var(--crit)} .pill.neut{background:var(--surface-2); color:var(--muted)}
  .pill.dot::before{content:""; width:6px; height:6px; border-radius:50%; background:currentColor}

  .card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:19px 19px 21px; box-shadow:var(--shadow)}
  .card > .head{display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:15px; flex-wrap:wrap}
  .card > .head p{color:var(--muted); font-size:12.5px}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  .grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:16px}
  @media(max-width:820px){.grid2,.grid3{grid-template-columns:1fr}}

  .funnel{display:flex; flex-direction:column; gap:9px}
  .frow{display:grid; grid-template-columns:112px 1fr; gap:12px; align-items:center}
  .frow .fl{font-family:var(--mono); font-size:12px; color:var(--muted); text-align:right}
  .fbar-t{display:flex; align-items:center; gap:9px}
  .fbar{height:28px; border-radius:7px; display:flex; align-items:center; min-width:2px}
  .fval{font-family:var(--mono); font-size:14px; font-weight:700; font-variant-numeric:tabular-nums}
  .fnote{font-size:11px; color:var(--faint)}
  @media(max-width:600px){.frow{grid-template-columns:80px 1fr}}

  .chart{display:flex; align-items:flex-end; gap:5px; height:150px; padding-top:8px}
  .wk{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; min-width:0}
  .stack{width:100%; max-width:32px; display:flex; flex-direction:column; justify-content:flex-end; height:118px; position:relative}
  .stack .s-sign{background:var(--line); border-radius:4px 4px 0 0; width:100%}
  .stack .s-act{background:var(--good); border-radius:4px 4px 0 0; width:100%; position:absolute; bottom:0; left:0}
  .wk .wl{font-family:var(--mono); font-size:9px; color:var(--faint); white-space:nowrap; transform:rotate(-34deg); height:14px}
  .legend{display:flex; gap:16px; margin-top:10px; flex-wrap:wrap}
  .legend span{font-family:var(--mono); font-size:11px; color:var(--muted); display:inline-flex; align-items:center; gap:6px}
  .sw{width:11px; height:11px; border-radius:3px; display:inline-block}

  .spark{display:flex; align-items:flex-end; gap:3px; height:70px}
  .spark .sb{flex:1; min-width:0; background:var(--accent); border-radius:2px 2px 0 0; min-height:2px; opacity:.85}
  .spark .sb.today{background:var(--brass)}

  .mix{display:flex; flex-direction:column; gap:10px}
  .mrow{display:grid; grid-template-columns:74px 1fr 62px; gap:10px; align-items:center}
  .mrow .ml{font-family:var(--mono); font-size:12px; color:var(--muted)}
  .track{height:12px; background:var(--surface-2); border-radius:6px; overflow:hidden; position:relative}
  .fill{height:100%; border-radius:6px; background:var(--accent)}
  .fill.ai{background:var(--brass); position:absolute; left:0; top:0}
  .mrow .mv{font-family:var(--mono); font-size:12px; text-align:right; font-variant-numeric:tabular-nums; color:var(--ink)}

  .split{display:flex; flex-direction:column; gap:13px}
  .splitbar{display:flex; height:32px; border-radius:9px; overflow:hidden; border:1px solid var(--line)}
  .splitbar > div{display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:11px; color:#fff; font-weight:600; white-space:nowrap; overflow:hidden}
  .seg-anon{background:var(--faint)} .seg-int{background:var(--brass)} .seg-id{background:var(--accent)}
  .prov{display:flex; gap:9px; flex-wrap:wrap}
  .chipn{font-family:var(--mono); font-size:11.5px; color:var(--muted); background:var(--surface-2); border:1px solid var(--line); border-radius:8px; padding:5px 10px}
  .chipn b{color:var(--ink)}

  .stat2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .scell{border:1px solid var(--line); border-radius:12px; padding:13px; background:var(--surface-2)}
  .scell .hv{font-family:var(--mono); font-size:22px; font-weight:700; font-variant-numeric:tabular-nums}
  .scell .hl{font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.35}
  .health{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px}

  .route{display:flex; height:30px; border-radius:8px; overflow:hidden; border:1px solid var(--line); margin-top:4px}
  .route > div{display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:10.5px; color:#fff; font-weight:600}
  .r-haiku{background:var(--good)} .r-sonnet{background:var(--accent)} .r-other{background:var(--faint)}

  .gauge{margin-top:6px}
  .gtrack{position:relative; height:26px; background:var(--surface-2); border-radius:8px; overflow:hidden; border:1px solid var(--line)}
  .gfill{height:100%; background:linear-gradient(90deg,var(--good),var(--brass)); border-radius:8px}
  .gmark{position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--crit)}
  .gmark.warn{background:var(--warn)}
  .glabels{display:flex; justify-content:space-between; font-family:var(--mono); font-size:10px; color:var(--faint); margin-top:6px}

  .tablewrap{overflow-x:auto; border:1px solid var(--line); border-radius:12px}
  table{border-collapse:collapse; width:100%; min-width:640px}
  th,td{text-align:left; padding:10px 13px; font-size:13px; border-bottom:1px solid var(--line); white-space:nowrap}
  th{font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); font-weight:600}
  tbody tr:last-child td{border-bottom:none}
  tr.internal{opacity:.5}
  td .who{font-weight:600} td .meta{color:var(--faint); font-size:11px}
  td.n{font-family:var(--mono); font-variant-numeric:tabular-nums; text-align:right}

  .seg{display:flex; flex-direction:column; gap:9px; margin-top:4px}
  .segrow{display:grid; grid-template-columns:auto 1fr auto; gap:14px; align-items:center; padding:12px 14px; border:1px solid var(--line); border-radius:12px; background:var(--surface-2)}
  .segrow .sn{font-family:var(--mono); font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; min-width:32px; text-align:center}
  .segrow .st b{font-size:14px} .segrow .st p{font-size:12px; color:var(--muted); margin-top:2px}
  .segrow[data-sev="crit"]{border-left:3px solid var(--crit)}
  .segrow[data-sev="warn"]{border-left:3px solid var(--warn)}
  .segrow[data-sev="good"]{border-left:3px solid var(--good)}

  .loop{display:grid; grid-template-columns:repeat(4,1fr); gap:0; margin-top:6px}
  @media(max-width:760px){.loop{grid-template-columns:1fr 1fr}}
  .step{padding:13px; border:1px solid var(--line)}
  .step:not(:last-child){border-right:none}
  @media(max-width:760px){.step{border-right:1px solid var(--line)!important} .step:nth-child(odd){border-right:none!important}}
  .step .n{font-family:var(--mono); font-size:10px; color:var(--accent); letter-spacing:.1em}
  .step h3{margin:6px 0 5px} .step p{font-size:12px; color:var(--muted)}

  .dep{background:var(--brass-soft); border:1px solid var(--brass); border-radius:12px; padding:12px 15px; font-size:13px; color:var(--ink); margin-top:14px}
  .dep b{color:var(--brass)}
  .note{font-size:11.5px; color:var(--faint); border-top:1px solid var(--line); padding-top:15px; line-height:1.6; max-width:82ch}
  .kv{display:flex; flex-direction:column; gap:8px}
  .kvr{display:flex; justify-content:space-between; gap:12px; font-size:13px; padding-bottom:7px; border-bottom:1px solid var(--line)}
  .kvr:last-child{border-bottom:none; padding-bottom:0}
  .kvr .k{color:var(--muted)} .kvr .v{font-family:var(--mono); font-variant-numeric:tabular-nums}
  /* trends & reports */
  .segbar{display:inline-flex;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface-2)}
  .segbar button{border:none;background:transparent;color:var(--muted);font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;padding:7px 13px;cursor:pointer}
  .segbar button.on{background:var(--accent);color:#fff}
  .mtabs{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 12px}
  .mtab{font-family:var(--mono);font-size:11px;padding:6px 11px;border:1px solid var(--line);border-radius:999px;background:var(--surface-2);color:var(--muted);cursor:pointer}
  .mtab.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
  .trendchart{display:flex;align-items:flex-end;gap:2px;height:150px;overflow-x:auto;padding-top:12px;border-bottom:1px solid var(--line)}
  .tbar{flex:1 0 5px;min-height:2px;background:var(--accent);border-radius:2px 2px 0 0;cursor:pointer;opacity:.82;transition:opacity .15s}
  .tbar:hover{opacity:1} .tbar.sel{background:var(--brass);opacity:1}
  table.trend{border-collapse:collapse;width:100%;min-width:640px}
  table.trend th,table.trend td{padding:8px 11px;font-size:12px;white-space:nowrap;border-bottom:1px solid var(--line)}
  table.trend th{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);text-align:right}
  table.trend th:first-child{text-align:left}
  table.trend tbody tr{cursor:pointer} table.trend tbody tr:hover{background:var(--surface-2)}
  table.trend tr.sel{background:var(--accent-soft)}
  table.trend td.who{font-weight:600}
  .drill{margin-top:16px;border:1px solid var(--accent);border-radius:14px;padding:16px 17px;background:var(--accent-soft);display:none}
  .drill.on{display:block}
  .drill .dhead{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:12px}
  .drill .dclose{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 10px;cursor:pointer}
  .drillgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:700px){.drillgrid{grid-template-columns:1fr}}
  .dlist{display:flex;flex-direction:column;gap:6px;margin-top:8px}
  .dlist .di{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;border-bottom:1px solid var(--line);padding-bottom:5px}
  .dlist .di:last-child{border-bottom:none} .dlist .di.dmuted{opacity:.5}
  #app{display:none}
  .fade{animation:fade .4s ease}
  @keyframes fade{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}
</style>
</head>
<body>

<div id="gate" class="gate">
  <div class="gatecard">
    <div class="mark">◑</div>
    <span class="eyebrow" style="margin-top:14px;display:block">BeFree · Signal</span>
    <h1>Operator dashboard</h1>
    <p class="sub">Live product, revenue &amp; cost signal. Owner sign-in required.</p>
    <div id="pwbox">
      <label class="fl" for="email">Email</label>
      <input id="email" type="email" autocomplete="username" placeholder="you@heybefree.app">
      <label class="fl" for="pw">Password</label>
      <input id="pw" type="password" autocomplete="current-password" placeholder="••••••••">
      <button class="primary" id="loginBtn">Sign in</button>
    </div>
    <div id="gateErr" class="err"></div>
    <p class="hint">Restricted to BeFree owner accounts. Sign in with your app email &amp; password (e.g. your <b>vranaau@gmail.com</b> login). Data is read-only and never leaves your session.</p>
  </div>
</div>

<div id="app"><div class="wrap"><div class="page" id="page"></div></div></div>

<script>
var ANON = "sb_publishable_0icl1f8ErGgH9DrwUfCUQQ_aqh1YHjX";
var SUPA = "https://vicddpzvanjndlqzglue.supabase.co";
var TOKEN = null;
var REFRESH = null;
var TIMER = null, AGE = null, lastAt = 0;
var SERIES = null, CURGRAN = 'day', CURMETRIC = 'dumps', DRILL = null;
var METRICS = [['dumps','Dumps'],['signups','Signups'],['active','Active users'],['activations','Activations'],['entities','Items created'],['spend','Spend'],['errors','Errors']];

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function fmt(n){ n = Number(n||0); return n.toLocaleString('en-US'); }
function money(n){ return '$' + Number(n||0).toFixed(2); }
function pct(n){ return (Number(n||0)).toFixed(0) + '%'; }
function authUrl(g){ return SUPA + '/auth/v1/token?grant_type=' + g; }

// ── auth ────────────────────────────────────────────────────────────────
function saveTokens(j){
  TOKEN = j.access_token; REFRESH = j.refresh_token || null;
  try{ localStorage.setItem('sig_at', TOKEN); if(REFRESH) localStorage.setItem('sig_rt', REFRESH); }catch(e){}
}
function clearTokens(){ TOKEN=null; REFRESH=null; try{ localStorage.removeItem('sig_at'); localStorage.removeItem('sig_rt'); }catch(e){} }

function showErr(m){ var e=$('gateErr'); e.textContent=m; e.className='err show'; }
function clearErr(){ var e=$('gateErr'); e.className='err'; }

async function doPasswordLogin(){
  clearErr();
  var email=$('email').value.trim(), pw=$('pw').value;
  if(!email||!pw){ showErr('Enter your email and password.'); return; }
  var btn=$('loginBtn'); btn.disabled=true; btn.textContent='Signing in…';
  try{
    var r=await fetch(authUrl('password'), {method:'POST', headers:{apikey:ANON,'content-type':'application/json'}, body:JSON.stringify({email:email,password:pw})});
    var j=await r.json();
    if(!r.ok){ throw new Error(j.error_description||j.msg||j.error||'Sign-in failed'); }
    saveTokens(j);
    await boot();
  }catch(e){ showErr(e.message||'Sign-in failed'); btn.disabled=false; btn.textContent='Sign in'; }
}

async function tryRefresh(){
  var rt = REFRESH || (function(){ try{ return localStorage.getItem('sig_rt'); }catch(e){ return null; } })();
  if(!rt) return false;
  try{
    var r=await fetch(authUrl('refresh_token'), {method:'POST', headers:{apikey:ANON,'content-type':'application/json'}, body:JSON.stringify({refresh_token:rt})});
    var j=await r.json();
    if(!r.ok) return false;
    saveTokens(j); return true;
  }catch(e){ return false; }
}

// ── data + lifecycle ────────────────────────────────────────────────────
async function fetchData(){
  var r=await fetch(SUPA + '/functions/v1/signal?data=1', {headers:{authorization:'Bearer '+TOKEN, apikey:ANON}});
  if(r.status===401){ if(await tryRefresh()){ return fetchData(); } throw {auth:true}; }
  if(r.status===403){ throw {forbidden:true}; }
  if(!r.ok){ throw new Error('Server error ' + r.status); }
  return r.json();
}

async function boot(){
  try{
    var res = await fetchData();
    lastAt = Date.now();
    $('gate').style.display='none';
    $('app').style.display='block';
    render(res.data, res.viewer);
    startTimers();
  }catch(e){
    stopTimers();
    $('app').style.display='none';
    $('gate').style.display='flex';
    if(e && e.forbidden){ showErr('That account is not on the owner allow-list.'); clearTokens(); }
    else if(e && e.auth){ /* silent — show login */ clearTokens(); }
  }
}

async function refreshData(){
  try{ var res=await fetchData(); lastAt=Date.now(); render(res.data, res.viewer); }
  catch(e){ if(e && (e.auth||e.forbidden)){ boot(); } }
}
function startTimers(){
  stopTimers();
  TIMER = setInterval(refreshData, 60000);
  AGE = setInterval(function(){ var el=$('age'); if(el){ el.textContent = ago(lastAt); } }, 1000);
}
function stopTimers(){ if(TIMER) clearInterval(TIMER); if(AGE) clearInterval(AGE); TIMER=AGE=null; }
function ago(t){ var s=Math.round((Date.now()-t)/1000); if(s<60) return s+'s ago'; var m=Math.round(s/60); return m+'m ago'; }

function signOut(){ clearTokens(); stopTimers(); location.reload(); }

    + scell(money(pick(models,'haiku','spend')), 'Haiku spend · '+pick(models,'haiku','runs')+' runs')
    + '</div>'
    + '<p class="note" style="border:none;padding-top:12px">Cache is doing real work ('+AI.cache_hit_pct+'% of input tokens read from cache) and '+AI.personalized_pct+'% of dumps hit personalization. Cost per successful dump ≈ '+money(AI.spend_all/Math.max(1,AI.ok))+'.</p></section>');

  // ── errors ──
  var errs=d.errors||[]; var el='';
  errs.forEach(function(e){ el += '<li style="display:flex;gap:10px;align-items:baseline;font-size:13px;color:var(--muted);margin-bottom:8px"><span class="pill neut">×'+e.count+'</span><span>'+esc(shortErr(e.message))+'</span><span style="font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:auto;white-space:nowrap">'+esc(e.first)+(e.first!==e.last?'–'+esc(e.last):'')+'</span></li>'; });
  H.push('<section class="card"><div class="head"><h2>Errors — all '+AI.err+' ever</h2><p>every failure is old or user-initiated</p></div><ul style="margin:0;padding:0;list-style:none">'+el+'</ul></section>');

  // ── users worth knowing ──
  var ul=d.users_list||[];
  var rows='';
  ul.forEach(function(u){
    var cls=u.is_internal?' class="internal"':'';
    var reach=u.is_anon?'<span class="pill neut">anon</span>':(u.reachable?'<span class="pill good">reachable</span>':'<span class="pill neut">—</span>');
    var badge=u.is_internal?' <span class="pill neut">test</span>':(u.tier==='pro'?' <span class="pill" style="background:var(--brass-soft);color:var(--brass)">pro</span>':'');
    rows += '<tr'+cls+'><td><span class="who">'+esc(u.label)+'</span>'+badge+'<br><span class="meta">'+esc(u.provider)+(u.email?' · '+esc(u.email):'')+'</span></td>'
      + '<td class="n">'+u.dumps+'</td><td class="n">'+u.items+'</td><td class="n">'+money(u.spend)+'</td>'
      + '<td class="n">'+(u.idle_days==null?'—':u.idle_days+'d')+'</td><td>'+statusPill(u.status)+'</td><td>'+reach+'</td></tr>';
  });
  H.push('<section class="card"><div class="head"><h2>Users worth knowing</h2><p>everyone with ≥1 dump · owner/test rows dimmed</p></div><div class="tablewrap"><table>'
    + '<thead><tr><th>User</th><th>Dumps</th><th>Items</th><th>Spend</th><th>Idle</th><th>Status</th><th>Reach</th></tr></thead><tbody>'+rows+'</tbody></table></div></section>');

  // ── re-engagement ──
  var S=d.segments||{}, na=S.never_activated||{count:0,sample:[]}, dp=(S.dormant_power||[])[0], rp=(S.recent_pro||[])[0];
  H.push('<section class="card" style="border-color:var(--accent)"><div class="head"><div><span class="eyebrow" style="color:var(--accent)">The gap</span><h2 style="margin-top:6px">Re-engagement loop</h2></div><p style="max-width:34ch">No channel exists yet to reach a churned user — every notification is on-device only.</p></div>'
    + '<p style="font-size:14px;color:var(--muted);max-width:80ch;margin-bottom:16px">Every BeFree notification is <b style="color:var(--ink)">local</b>. There is <b style="color:var(--ink)">no remote push</b> (no APNs token capture) and <b style="color:var(--ink)">no email/lifecycle machinery</b>. The moment someone stops opening the app, you have no way to say "come back." Building that channel is the unlock.</p>'
    + '<h3 style="margin-bottom:10px">Segments that need it now</h3><div class="seg">');
  if(rp) H.push('<div class="segrow" data-sev="crit"><span class="sn" style="color:var(--crit)">1</span><div class="st"><b>Recent Pro — protect the conversion</b><p>'+esc(rp.label)+(rp.email?' ('+esc(rp.email)+')':'')+' started an <b>'+esc(rp.pro_period)+'</b> Pro plan recently and is dumping ('+rp.dumps+' so far). Confirm the trial converts, not cancels.</p></div><span class="pill crit dot">watch</span></div>');
  if(dp) H.push('<div class="segrow" data-sev="warn"><span class="sn" style="color:var(--warn)">1</span><div class="st"><b>Power user gone quiet</b><p>'+esc(dp.label)+' — '+dp.dumps+' dumps, '+dp.items+' items, silent <b>'+dp.idle_days+' days</b>. Your highest-value real user. Worth a <b>personal</b> note.</p></div><span class="pill warn dot">high leverage</span></div>');
  H.push('<div class="segrow" data-sev="warn"><span class="sn" style="color:var(--warn)">'+na.count+'</span><div class="st"><b>Never activated</b><p>Identified externals who signed up but never ran a dump'+(na.sample&&na.sample.length?' (e.g. '+na.sample.map(esc).join(', ')+')':'')+'. A "finish your first brain dump" nudge targets the biggest funnel leak.</p></div><span class="pill neut">activation</span></div>');
  H.push('<div class="segrow" data-sev="good"><span class="sn" style="color:var(--muted)">'+(S.light_winback||0)+'</span><div class="st"><b>Light-user win-back</b><p>People who did a few dumps then drifted. Lower priority — prove the loop on the segments above first.</p></div><span class="pill neut">later</span></div></div>');

  H.push('<h3 style="margin:22px 0 10px">The loop</h3><div class="loop">'
    + '<div class="step"><span class="n">01 · DETECT</span><h3>Segment daily</h3><p>A scheduled edge function buckets users by last-activity. Read-only SQL — safe to build first. (This RPC already does it.)</p></div>'
    + '<div class="step"><span class="n">02 · DECIDE</span><h3>Pick &amp; gate</h3><p>One message per segment. Cap frequency, honour quiet-hours, send at a sane <b>local</b> hour.</p></div>'
    + '<div class="step"><span class="n">03 · DELIVER</span><h3>Send</h3><p>Email now (reaches the '+U.reachable+' identified), push later (reaches everyone). Deep-link into the right screen.</p></div>'
    + '<div class="step"><span class="n">04 · MEASURE</span><h3>Attribute</h3><p>Tag the deep link so re-opens and the next dump attribute back. Kill what doesn\'t work.</p></div></div>');

  var tzSet=d.infra.timezone_set, tzTot=d.infra.profiles;
  H.push('<div class="dep"><b>Dependency check (live):</b> to send at a sane local hour the loop needs each user\'s timezone — and right now <b>'+tzSet+' of '+tzTot+' profiles</b> have a non-UTC timezone set. '+(tzSet===0?'The <b>profiles.timezone</b> backfill (PR #240) has not populated a single row yet — step 02 is blocked until it does.':'Backfill is underway.')+'</div></section>');

  // ── AI accuracy + brand studio + infra ──
  var FB=d.feedback||{by_signal:[],total:0,ai_entities:0}; var corrPct = FB.ai_entities? (100*FB.total/FB.ai_entities):0;
  var sigRows=''; (FB.by_signal||[]).forEach(function(s){ sigRows += kvr(s.signal, s.count+''); });
  var BS=d.brand_studio||{};
  H.push('<div class="grid3"><section class="card"><div class="head"><h2>AI accuracy</h2><p>correction signals</p></div><div class="kv">'
    + sigRows
    + kvr('vs AI-created entities', FB.ai_entities+'')
    + kvr('Correction rate', corrPct.toFixed(0)+'%')
    + '</div><p class="note" style="border:none;padding-top:10px;font-size:11px">Mostly <b>delete</b> signals — users clearing test/AI items. Low edit/recategorize = classification is landing.</p></section>');
  H.push('<section class="card"><div class="head"><h2>Brand Studio</h2><p>marketing engine</p></div><div class="kv">'
    + kvr('Posts', BS.posts+'') + kvr('Published', BS.published+'') + kvr('Variants', BS.variants+'') + kvr('Live seeds', BS.seeds+'')
    + kvr('Last activity', BS.last_activity? fmtDate(BS.last_activity):'—')
    + '</div></section>');
  var IN=d.infra||{};
  H.push('<section class="card"><div class="head"><h2>Data footprint</h2><p>backend</p></div><div class="kv">'
    + kvr('Profiles', IN.profiles+'') + kvr('Embeddings (RAG)', fmt(IN.embeddings)) + kvr('Chat messages', fmt(IN.chat_messages))
    + kvr('External calendars', IN.external_calendars+'') + kvr('Webhook events', IN.webhook_events+'')
    + '</div></section></div>');

  // ── footer ──
  H.push('<p class="note">Live Supabase product data via <b>signal_dashboard()</b>, recomputed on every load · viewing as <b>'+esc(viewer)+'</b> · generated '+fmtDate(d.generated_at)+' · auto-refresh 60s. Owner/test accounts ('+U.internal+') are flagged and excluded from "genuine external" counts. "active/churned" is inferred from dump recency, not app-opens. Anonymous users are unreachable (no address).</p>');

  $('page').innerHTML = H.join('');
  document.getElementById('app').classList.add('fade');
  initTrends();
}

// render helpers (strings only)
function kpi(stripe,label,val,pill,sub){ return '<div class="kpi" style="--stripe:'+stripe+'"><span class="label">'+esc(label)+'</span><span class="val num">'+val+'</span>'+pill+'<span class="sub">'+esc(sub)+'</span></div>'; }
function frow(l,v,w,color,note){ return '<div class="frow"><span class="fl">'+esc(l)+'</span><div class="fbar-t"><div class="fbar" style="width:'+w+'%;background:'+color+'"></div><span class="fval">'+v+'</span>'+(note?'<span class="fnote">'+esc(note)+'</span>':'')+'</div></div>'; }
function scell(v,l){ return '<div class="scell"><div class="hv">'+v+'</div><div class="hl">'+esc(l)+'</div></div>'; }
function kvr(k,v){ return '<div class="kvr"><span class="k">'+esc(k)+'</span><span class="v">'+esc(v)+'</span></div>'; }
function pick(models,name,field){ for(var i=0;i<models.length;i++){ if(new RegExp(name,'i').test(models[i].model)) return models[i][field]; } return 0; }
function shortErr(m){ m=String(m||''); if(/aborted/i.test(m)) return '"Request was aborted" — user cancelled mid-dump. Expected, not a failure.'; if(/credit balance/i.test(m)) return '"Credit balance too low" — the Jun 1 Anthropic funding gap, since resolved.'; if(/cache_control/i.test(m)) return '"Max 4 cache_control blocks" — the cache bug fixed in May.'; if(/unknown/i.test(m)) return 'Unlabelled early failure (pre-instrumentation).'; return m.slice(0,90); }
function fmtDate(s){ try{ var d=new Date(s); return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }catch(e){ return s; } }

// ── trends & reports ──
async function apiGet(qs){
  var r=await fetch(SUPA + '/functions/v1/signal?data=1&' + qs, {headers:{authorization:'Bearer '+TOKEN, apikey:ANON}});
  if(r.status===401){ if(await tryRefresh()){ return apiGet(qs); } throw {auth:true}; }
  if(!r.ok){ throw new Error('server '+r.status); }
  return r.json();
}
async function fetchSeries(){ var res=await apiGet('kind=series'); SERIES=res.data; }
function fmtVal(k,v){ return k==='spend' ? money(v) : fmt(v); }

function initTrends(){
  var mt=$('metricTabs'); if(!mt) return;
  mt.innerHTML = METRICS.map(function(m){ return '<span class="mtab'+(m[0]===CURMETRIC?' on':'')+'" data-m="'+m[0]+'">'+esc(m[1])+'</span>'; }).join('');
  mt.querySelectorAll('.mtab').forEach(function(el){ el.addEventListener('click', function(){ CURMETRIC=el.getAttribute('data-m'); initTrends(); }); });
  var gs=$('granSeg');
  if(gs){ gs.querySelectorAll('button').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-g')===CURGRAN);
    b.addEventListener('click', function(){ if(CURGRAN!==b.getAttribute('data-g')){ CURGRAN=b.getAttribute('data-g'); DRILL=null; closeDrill(); } initTrends(); }); }); }
  if(!SERIES){ $('trendChart').innerHTML='<div style="color:var(--faint);font-family:var(--mono);font-size:12px;padding:24px 4px">loading time-series…</div>';
    fetchSeries().then(function(){ renderTrends(); if(DRILL) openDrill(DRILL.iso); }).catch(function(e){ if(e&&e.auth){ boot(); } }); }
  else { renderTrends(); }
}

function renderTrends(){
  if(!SERIES){ return; }
  var rows = SERIES[CURGRAN] || [];
  var mx=0; rows.forEach(function(r){ mx=Math.max(mx, Number(r[CURMETRIC])||0); });
  var bars = rows.map(function(r){
    var v=Number(r[CURMETRIC])||0; var h=mx? Math.max(2, Math.round(v/mx*128)) : 2;
    var sel=(DRILL && DRILL.iso===r.iso)?' sel':'';
    return '<div class="tbar'+sel+'" style="height:'+h+'px" title="'+esc(r.label)+' · '+esc(fmtVal(CURMETRIC,v))+'" data-iso="'+esc(r.iso)+'"></div>';
  }).join('');
  var tc=$('trendChart'); if(!tc) return;
  tc.innerHTML = bars || '<div style="color:var(--faint);padding:24px">no data in range</div>';
  tc.querySelectorAll('.tbar').forEach(function(b){ b.addEventListener('click', function(){ openDrill(b.getAttribute('data-iso')); }); });
  var recent = rows.slice(-24).reverse();
  var th='<tr><th>Period</th>'+METRICS.map(function(m){ return '<th>'+esc(m[1])+'</th>'; }).join('')+'</tr>';
  var body = recent.map(function(r){
    var sel=(DRILL && DRILL.iso===r.iso)?' class="sel"':'';
    return '<tr'+sel+' data-iso="'+esc(r.iso)+'"><td class="who">'+esc(r.label)+'</td>'+METRICS.map(function(m){ return '<td class="n">'+esc(fmtVal(m[0], Number(r[m[0]])||0))+'</td>'; }).join('')+'</tr>';
  }).join('');
  $('trendTableWrap').innerHTML = '<table class="trend"><thead>'+th+'</thead><tbody>'+body+'</tbody></table>';
  $('trendTableWrap').querySelectorAll('tbody tr').forEach(function(tr){ tr.addEventListener('click', function(){ openDrill(tr.getAttribute('data-iso')); }); });
}

async function openDrill(iso){
  DRILL={ gran:CURGRAN, iso:iso };
  renderTrends();
  var el=$('drill'); if(!el) return;
  el.className='drill on'; el.innerHTML='<div style="color:var(--faint);font-family:var(--mono);font-size:12px">loading period…</div>';
  try{
    var res=await apiGet('kind=report&bucket='+encodeURIComponent(CURGRAN)+'&start='+encodeURIComponent(iso));
    var d=res.data; if(!d){ el.innerHTML='<div style="color:var(--crit)">No data.</div>'; return; }
    var t=d.totals||{}, sign=d.signups_list||[], dump=d.dumpers||[], ent=d.entities||[];
    var signHtml = sign.length ? sign.map(function(s){ return '<div class="di'+(s.internal?' dmuted':'')+'"><span>'+esc(s.label)+(s.internal?' <span class="pill neut">test</span>':'')+'</span><span style="color:var(--muted)">'+esc(s.provider)+'</span></div>'; }).join('') : '<div class="di" style="color:var(--faint)">no signups this period</div>';
    var dumpHtml = dump.length ? dump.map(function(x){ return '<div class="di"><span>'+esc(x.label)+'</span><span class="num">'+x.dumps+' dumps · '+money(x.spend)+'</span></div>'; }).join('') : '<div class="di" style="color:var(--faint)">no captures this period</div>';
    var entHtml = ent.length ? ent.map(function(x){ return '<div class="di"><span>'+esc(x.kind)+'</span><span class="num">'+x.count+'</span></div>'; }).join('') : '<div class="di" style="color:var(--faint)">nothing created</div>';
    el.innerHTML =
      '<div class="dhead"><div><span class="eyebrow" style="color:var(--accent)">Drill-down · '+esc(d.bucket)+'</span><h3 style="margin-top:4px;font-size:16px">'+esc(d.label)+'</h3></div><button class="dclose" onclick="closeDrill()">✕ close</button></div>'
      + '<div class="health" style="margin-bottom:14px">'
      + scell(fmt(t.dumps||0), (t.dumps_ok||0)+' ok · '+(t.errors||0)+' err')
      + scell(fmt(t.signups||0), 'signups')
      + scell(fmt(t.active||0), 'active users')
      + scell(money(t.spend||0), 'AI spend')
      + '</div><div class="drillgrid">'
      + '<div><h3 style="font-size:13px">Signed up ('+sign.length+')</h3><div class="dlist">'+signHtml+'</div></div>'
      + '<div><h3 style="font-size:13px">Top capturers</h3><div class="dlist">'+dumpHtml+'</div></div>'
      + '</div><h3 style="font-size:13px;margin-top:16px">Items created</h3><div class="dlist" style="max-width:340px">'+entHtml+'</div>';
  }catch(e){ if(e&&e.auth){ boot(); return; } el.innerHTML='<div style="color:var(--crit);font-size:13px">Could not load this period.</div>'; }
}
function closeDrill(){ DRILL=null; var el=$('drill'); if(el){ el.className='drill'; el.innerHTML=''; } if(SERIES) renderTrends(); }
function manualRefresh(){ SERIES=null; refreshData(); }

// wire login UI
$('loginBtn').addEventListener('click', doPasswordLogin);
$('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') doPasswordLogin(); });
window.addEventListener('focus', function(){ if(TOKEN) refreshData(); });

// auto-resume a stored session
(function(){ try{ var at=localStorage.getItem('sig_at'); if(at){ TOKEN=at; boot(); } }catch(e){} })();
</script>
